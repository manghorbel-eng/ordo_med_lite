<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordonnance - OrdoMed</title>
    
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="images/favicon-simple.svg">
    <link rel="apple-touch-icon" sizes="192x192" href="images/favicon-192.svg">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    
    <style>
        .pro-feature { opacity: 0.6; cursor: not-allowed; }
        .pro-feature > * { pointer-events: none; }

        /* Empêche l'icône et le titre de passer sur deux lignes */
        .section-title {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }
        .section-title i { flex-shrink: 0; }

        .med-row .btn-remove-med {
            flex-shrink: 0;
        }

        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; }
            .no-print { display: none !important; }
        }
        
        .print-preview {
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            min-height: 297mm; /* A4 */
            width: 210mm;
            margin: 0 auto;
            position: relative;
            transform: scale(0.65);
            transform-origin: top center;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="app-sidebar no-print" id="sidebar">
        <div class="sidebar-header d-flex justify-content-between align-items-center">
            <a href="dashboard.html" class="sidebar-brand text-decoration-none">
                <img src="images/favicon-simple.svg" alt="OrdoMed" width="32" height="32" class="me-2">
                <span class="fs-4 fw-bold">OrdoMed</span>
            </a>
            <button class="btn-close d-lg-none sidebar-close"></button>
        </div>
        <div class="sidebar-content">
            <ul class="app-sidebar-nav list-unstyled mb-0">
                <li class="sidebar-item">
                    <a href="dashboard.html" class="app-sidebar-link">
                        <i class="bi bi-house-door me-2"></i> Tableau de bord
                    </a>
                </li>
                <li class="mt-3 app-sidebar-header px-3 mb-1 text-muted text-uppercase small">Prescriptions</li>
                <li class="sidebar-item">
                    <a href="ordonnance.html" class="app-sidebar-link active">
                        <i class="bi bi-file-medical me-2"></i> Ordonnances
                    </a>
                </li>
                
                <li class="mt-3 app-sidebar-header px-3 mb-1 text-muted text-uppercase small">Bases de données</li>
                <li class="sidebar-item pro-feature">
                    <a href="#" class="app-sidebar-link text-muted d-flex align-items-center">
                        <i class="bi bi-people me-2"></i> Patients
                        <span class="badge bg-secondary ms-auto" style="font-size: 0.6rem;">PRO</span>
                    </a>
                </li>
                <li class="sidebar-item pro-feature">
                    <a href="#" class="app-sidebar-link text-muted d-flex align-items-center">
                        <i class="bi bi-capsule me-2"></i> Médicaments
                        <span class="badge bg-secondary ms-auto" style="font-size: 0.6rem;">PRO</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>

    <!-- Wrapper -->
    <div class="app-wrapper">
        <header class="app-header no-print">
            <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-3 w-100">
                <div class="container-fluid position-relative">
                    <div class="d-flex align-items-center">
                        <button class="navbar-toggler ms-2 sidebar-toggle" type="button">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="navbar-date-modern ms-3 d-none d-md-flex">
                            <i class="bi bi-calendar3 text-primary"></i>
                            <span id="navbar-date-display" class="fw-semibold"></span>
                        </div>
                    </div>
                </div>
            </nav>
        </header>

        <main class="app-content p-3 p-md-4">
            <div class="d-flex justify-content-between align-items-center mb-4 no-print flex-wrap gap-2">
                <h1 class="h3 mb-0 section-title">
                    <i class="bi bi-file-medical"></i><span>Nouvelle Ordonnance</span>
                </h1>
                <button id="save-print-btn" class="btn btn-primary">
                    <i class="bi bi-printer me-1"></i> Imprimer
                </button>
            </div>

            <div class="row g-4 no-print">
                <div class="col-md-5">
                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white section-title">
                            <i class="bi bi-person text-primary"></i><h5 class="mb-0">Informations</h5>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label class="form-label">Nom du patient</label>
                                <input type="text" id="patient-name" class="form-control" placeholder="Ex: Jean Dupont">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Date de l'ordonnance</label>
                                <input type="date" id="ordo-date" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Code APCI (Optionnel)</label>
                                <input type="text" id="code-apci" class="form-control" placeholder="Ex: 12345">
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm mb-4">
                        <div class="card-header bg-white section-title">
                            <i class="bi bi-capsule text-primary"></i><h5 class="mb-0">Médicaments</h5>
                        </div>
                        <div class="card-body">
                            <div class="row g-2 mb-1 d-none d-sm-flex">
                                <div class="col-5"><small class="text-muted">Médicament</small></div>
                                <div class="col-5"><small class="text-muted">Posologie</small></div>
                            </div>
                            <div id="med-rows"></div>
                        </div>
                    </div>

                    <div class="card shadow-sm">
                        <div class="card-header bg-white d-flex justify-content-between align-items-center">
                            <span class="section-title mb-0"><i class="bi bi-sliders text-primary"></i><h5 class="mb-0">Paramétrage Impression</h5></span>
                            <button id="save-settings-btn" class="btn btn-sm btn-outline-success">Sauvegarder</button>
                        </div>
                        <div class="card-body">
                            <div class="row g-3">
                                <div class="col-6">
                                    <label class="form-label small">Date Y (cm)</label>
                                    <input type="number" step="0.1" id="set-date-y" class="form-control form-control-sm" value="4.5">
                                </div>
                                <div class="col-6">
                                    <label class="form-label small">Patient Y (cm)</label>
                                    <input type="number" step="0.1" id="set-patient-y" class="form-control form-control-sm" value="5.5">
                                </div>
                                <div class="col-6">
                                    <label class="form-label small">APCI Y (cm)</label>
                                    <input type="number" step="0.1" id="set-apci-y" class="form-control form-control-sm" value="6.5">
                                </div>
                                <div class="col-6">
                                    <label class="form-label small">Médicaments Y (cm)</label>
                                    <input type="number" step="0.1" id="set-meds-y" class="form-control form-control-sm" value="7.5">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="card shadow-sm">
                        <div class="card-header bg-white section-title">
                            <i class="bi bi-eye text-primary"></i><h5 class="mb-0">Aperçu Avant Impression</h5>
                        </div>
                        <div class="card-body p-0 bg-light" style="overflow: hidden;">
                            <div id="print-area" class="print-preview">
                                <div id="preview-date" style="position: absolute; width: 100%; text-align: center;"></div>
                                <div id="preview-patient" style="position: absolute; width: 100%; text-align: center; font-weight: 500; font-size: 1.2rem;"></div>
                                <div id="preview-apci" style="position: absolute; width: 100%; text-align: center; font-weight: 500;"></div>
                                <div id="preview-meds" style="position: absolute; width: 100%; padding: 0 2cm;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Gabarit d'une ligne médicament (utilisé par le JS) -->
    <template id="med-row-template">
        <div class="row g-2 mb-2 med-row align-items-center">
            <div class="col-5">
                <input type="text" class="form-control med-name" placeholder="Nom du médicament">
            </div>
            <div class="col-5">
                <input type="text" class="form-control med-posologie" placeholder="Posologie">
            </div>
            <div class="col-2 text-end">
                <button type="button" class="btn btn-outline-danger btn-sm btn-remove-med" title="Supprimer">
                    <i class="bi bi-trash"></i>
                </button>
            </div>
        </div>
    </template>

    <script type="module" src="js/ordonnance.js"></script>
    <script>
        // Sidebar toggle logic
        document.querySelector('.sidebar-toggle')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('show');
        });
        document.querySelector('.sidebar-close')?.addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('show');
        });
        
        // Date display
        const dateDisplay = document.getElementById('navbar-date-display');
        if(dateDisplay) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            dateDisplay.textContent = new Date().toLocaleDateString('fr-FR', options);
        }
    </script>
</body>
</html>
