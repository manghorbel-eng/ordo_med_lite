<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ordonnance - OrdoMed Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary no-print">
        <div class="container-fluid">
            <a class="navbar-brand" href="dashboard.html">OrdoMed Lite</a>
            <div class="d-flex">
                <a href="dashboard.html" class="btn btn-outline-light btn-sm me-2">Retour</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4 no-print">
        <div class="row">
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-header bg-white"><strong>Détails</strong></div>
                    <div class="card-body">
                        <input type="text" id="patient-name" class="form-control mb-2" placeholder="Nom du patient">
                        <input type="text" id="code-apci" class="form-control mb-2" placeholder="Code APCI (Optionnel)">
                    </div>
                </div>

                <div class="card mb-3">
                    <div class="card-header bg-white"><strong>Médicaments</strong></div>
                    <div class="card-body">
                        <input type="text" id="med-name" class="form-control mb-2" placeholder="Nom du médicament">
                        <input type="text" id="med-posologie" class="form-control mb-2" placeholder="Posologie">
                        <button id="add-med-btn" class="btn btn-secondary w-100 mb-3">Ajouter Médicament</button>
                        
                        <ul id="med-list" class="list-group mb-3"></ul>
                        
                        <button id="save-print-btn" class="btn btn-primary w-100"><i class="bi bi-printer"></i> Sauvegarder & Imprimer</button>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card mb-3">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <strong>Paramétrage (Positions en cm)</strong>
                        <button id="save-settings-btn" class="btn btn-sm btn-outline-primary">Enregistrer réglages</button>
                    </div>
                    <div class="card-body row g-2">
                        <div class="col-3">
                            <label class="small">Date Y</label>
                            <input type="number" step="0.1" id="set-date-y" class="form-control form-control-sm" value="4.5">
                        </div>
                        <div class="col-3">
                            <label class="small">Patient Y</label>
                            <input type="number" step="0.1" id="set-patient-y" class="form-control form-control-sm" value="5.5">
                        </div>
                        <div class="col-3">
                            <label class="small">APCI Y</label>
                            <input type="number" step="0.1" id="set-apci-y" class="form-control form-control-sm" value="6.5">
                        </div>
                        <div class="col-3">
                            <label class="small">Meds Y</label>
                            <input type="number" step="0.1" id="set-meds-y" class="form-control form-control-sm" value="7.5">
                        </div>
                    </div>
                </div>

                <!-- Aperçu -->
                <div class="border bg-light p-3 overflow-auto" style="height: 600px;">
                    <div id="print-area" class="print-preview">
                        <div id="preview-date" style="position: absolute; width: 100%; text-align: center;"></div>
                        <div id="preview-patient" style="position: absolute; width: 100%; text-align: center; font-weight: bold;"></div>
                        <div id="preview-apci" style="position: absolute; width: 100%; text-align: center;"></div>
                        <div id="preview-meds" style="position: absolute; width: 100%; padding: 0 2cm;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script src="js/ordonnance.js"></script>
</body>
</html>
