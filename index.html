<!DOCTYPE html>
<html lang="fr" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrdoMed - Connexion</title>
    
    <!-- Favicon (identique à l'original) -->
    <link rel="icon" type="image/svg+xml" href="images/favicon.svg">
    <link rel="icon" type="image/svg+xml" sizes="32x32" href="images/favicon-simple.svg">
    <link rel="apple-touch-icon" sizes="192x192" href="images/favicon-192.svg">
    <link rel="shortcut icon" href="images/favicon.svg">
    <meta name="theme-color" content="#0d6efd">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS original -->
    <link href="css/style.css" rel="stylesheet">
    
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bs-body-bg);
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .brand-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="login-page">
    <div class="container">
        <div class="card login-card mx-auto border-0">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <img src="images/favicon.svg" alt="OrdoMed Logo" class="brand-logo">
                    <h2 class="h3 fw-bold text-primary">OrdoMed</h2>
                    <p class="text-muted">Connectez-vous à votre espace</p>
                </div>
                
                <form id="auth-form">
                    <div class="mb-3">
                        <label class="form-label" for="email">Adresse email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" id="email" class="form-control" placeholder="nom@exemple.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label" for="password">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <button type="submit" id="login-btn" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                        </button>
                        <button type="button" id="signup-btn" class="btn btn-outline-secondary">
                            Créer un compte
                        </button>
                    </div>
                    
                    <div id="auth-error" class="alert alert-danger mt-3 mb-0" style="display: none;" role="alert"></div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
